{% extends 'base.html' %}
{% block title %}
        Home
    {% endblock title %}
{% block body %}

    <div class="container-fluid">
      
      <div class="container mt-5">
        <div class="container mt-5 ">
          <form class="w-100" action ='/Update/{{ToDo.sno}}' method ="POST" >
            <div class="mb-3">
              <H1>Update ToDos</H1>
              <label for="title" class="form-label">Todo Title</label>
              <input type="text" class="form-control" name="title" id="title"  value="{{ToDo.title}}" aria-describedby="text">
              
            </div>
            <div class="mb-3">
              <label for="desc" class="form-label">Todo Description</label>
              <input type="text" class="form-control" value="{{ToDo.desc}}" name="desc" id="desc">
            </div>
          
            <button type="submit" class="btn btn-primary">Update</button>
          </form>
        </div>
        
      </div>
      

    </div>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    -->
    {% endblock body %}
